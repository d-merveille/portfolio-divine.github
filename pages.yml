name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # déclenche le déploiement quand tu pushes sur la branche main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer ton code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configurer GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v3

      # 3. Upload des fichiers (ton site statique)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./   # ici, on prend les fichiers à la racine (index.html, style.css, etc.)

      # 4. Déploiement
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
